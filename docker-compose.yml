services:
  qwen3_embedding:
    build: .
    container_name: qwen3_embedding_openai
    restart: unless-stopped
    ports:
      - "12302:12302"
    environment:
      MODEL_ID: "Qwen/Qwen3-Embedding-4B"
      # MODEL_REVISION: "main"
      HOST: "0.0.0.0"
      PORT: "12302"
      VLLM_HOST: "127.0.0.1"
      VLLM_PORT: "8001"
      TZ: "Asia/Shanghai"
      HF_HOME: "/models"
      DTYPE: "float16"
      # Qwen3-Embedding-4B 在 RTX 2080 Ti (22GB) 上使用更保守的默认值
      MAX_MODEL_LEN: "8192"
      MAX_DIMENSIONS: "2560"
      GPU_MEMORY_UTILIZATION: "0.80"
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      DEFAULT_QUERY_INSTRUCTION: "Given a web search query, retrieve relevant passages that answer the query"
      PRELOAD_MODEL: "1"
      ADMIN_TOKEN: "change-me"
      HTTP_PROXY: ${HTTP_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
      # 可选：追加给 vLLM 的参数，例如张量并行或 trust-remote-code
      # VLLM_EXTRA_ARGS: "--tensor-parallel-size 2"
    volumes:
      - ./models:/models
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # 选卡：宿主机第 1 张卡写 "0"，第 2 张卡写 "1"
              # 当前固定绑定宿主机第 2 张卡
              device_ids: ["1"]
              capabilities: [gpu]
